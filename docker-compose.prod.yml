version: '3.8'

# Production-ready docker-compose with advanced features

services:
  # Backend Service - Node.js Express with Python inference
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      cache_from:
        - carematch-backend:latest
    image: carematch-backend:latest
    container_name: carematch-backend-prod
    hostname: backend
    ports:
      - "5000:5000"
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./carematch_ppo.zip:/app/carematch_ppo.zip:ro
      - backend-logs:/var/log/carematch
    networks:
      - carematch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Frontend Service - React compiled with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      cache_from:
        - carematch-frontend:latest
    image: carematch-frontend:latest
    container_name: carematch-frontend-prod
    hostname: frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - carematch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  carematch-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  backend-logs:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./logs/backend
