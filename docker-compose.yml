version: '3.8'

services:
  # Backend Service - Node.js Express with Python inference
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: carematch-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - ./carematch_ppo.zip:/app/carematch_ppo.zip:ro
    networks:
      - carematch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Service - React with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carematch-frontend
    ports:
      - "80:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - carematch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  carematch-network:
    driver: bridge

volumes:
  backend-cache:
    driver: local
